# ═══════════════════════════════════════════
# ServerLens MCP Client — Конфигурация
# ═══════════════════════════════════════════
#
# Этот файл описывает УДАЛЁННЫЕ серверы, на которых установлен ServerLens.
# MCP-клиент (эта программа) работает на ТВОЕЙ машине и подключается
# к серверам через SSH.
#
# Установка:
#   cp config.example.yaml ~/.serverlens/config.yaml
#   nano ~/.serverlens/config.yaml

servers:
  # ─── Имя сервера ───
  # Придумай любое: monitor, production, web1, staging...
  # Имя сервера используется в вызовах serverlens_call:
  #   { "server": "monitor", "tool": "logs_tail", ... }
  # и в логах MCP-клиента.
  monitor:

    # ─── SSH-подключение ───
    # Данные для подключения к удалённому серверу (как в ssh rucode@1.2.3.4)
    ssh:
      host: "1.2.3.4"                # IP или hostname удалённого сервера
      user: "rucode"                  # SSH-пользователь
      port: 22
      key: "~/.ssh/id_ed25519"       # путь к SSH-ключу НА ТВОЕЙ МАШИНЕ
      # Дополнительные SSH-опции (опционально).
      # Keepalive (ServerAliveInterval=15) уже встроен в MCP-клиент;
      # блок options нужен только для своих значений или других опций.
      options:
        ConnectTimeout: "10"
        ServerAliveInterval: "30"
        ServerAliveCountMax: "3"

    # ─── Пути на удалённом сервере ───
    # Где находятся PHP и ServerLens на СЕРВЕРЕ (не на твоей машине!)
    remote:
      php: "php"                                          # обычно просто "php"
      serverlens_path: "/opt/serverlens/bin/serverlens"   # куда установился ServerLens
      config_path: "/etc/serverlens/config.yaml"          # конфиг ServerLens на сервере

  # ─── Пример второго сервера ───
  # Раскомментируй и заполни, если нужен ещё один:
  #
  # staging:
  #   ssh:
  #     host: "5.6.7.8"
  #     user: "rucode"
  #     key: "~/.ssh/id_ed25519"
  #   remote:
  #     php: "php"
  #     serverlens_path: "/opt/serverlens/bin/serverlens"
  #     config_path: "/etc/serverlens/config.yaml"
