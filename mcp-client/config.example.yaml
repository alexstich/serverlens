# ═══════════════════════════════════════════
# ServerLens MCP Client — Configuration
# ═══════════════════════════════════════════
#
# This file describes REMOTE servers where ServerLens is installed.
# The MCP client runs on YOUR machine and connects to servers over SSH.
#
# The client doesn't care how ServerLens is implemented on the server
# (Python, PHP, Go, etc.) — it just runs `serverlens serve --stdio`
# via SSH. The `serverlens` command is installed globally during setup.
#
# Setup:
#   cp config.example.yaml ~/.serverlens/config.yaml
#   nano ~/.serverlens/config.yaml

servers:

  # Server name — any label you like.
  # Used in serverlens_call: {"server": "production", "tool": "logs_tail", ...}
  production:
    ssh:
      host: "1.2.3.4"
      user: "deploy"
      port: 22
      key: "~/.ssh/id_ed25519"

  # Another server — just SSH credentials, nothing else.
  # staging:
  #   ssh:
  #     host: "5.6.7.8"
  #     user: "deploy"
  #     key: "~/.ssh/id_ed25519"

  # Advanced: override the remote command (rarely needed).
  # By default the client runs `serverlens serve --stdio`.
  # custom:
  #   ssh:
  #     host: "9.10.11.12"
  #     user: "deploy"
  #     key: "~/.ssh/id_ed25519"
  #   command: "/opt/serverlens/venv/bin/python -m serverlens serve --stdio --config /etc/serverlens/config.yaml"
