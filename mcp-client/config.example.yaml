# ═══════════════════════════════════════════
# ServerLens MCP Client — Configuration
# ═══════════════════════════════════════════
#
# This file describes REMOTE servers where ServerLens is installed.
# The MCP client (this program) runs on YOUR machine and connects
# to servers over SSH.
#
# Setup:
#   cp config.example.yaml ~/.serverlens/config.yaml
#   nano ~/.serverlens/config.yaml

servers:
  # ─── Server name ───
  # Pick any name: monitor, production, web1, staging...
  # The server name is used in serverlens_call:
  #   { "server": "monitor", "tool": "logs_tail", ... }
  # and in MCP client logs.
  monitor:

    # ─── SSH connection ───
    # Credentials for the remote server (like ssh deploy@1.2.3.4)
    ssh:
      host: "1.2.3.4"                # IP or hostname of the remote server
      user: "deploy"                  # SSH user
      port: 22
      key: "~/.ssh/id_ed25519"       # path to SSH key ON YOUR MACHINE
      # Extra SSH options (optional).
      # Keepalive (ServerAliveInterval=15) is built into the MCP client;
      # use options only for your own values or other flags.
      options:
        ConnectTimeout: "10"
        ServerAliveInterval: "30"
        ServerAliveCountMax: "3"

    # ─── Paths on the remote server ───
    # Where PHP and ServerLens live on the SERVER (not on your machine)
    remote:
      php: "php"                                          # usually just "php"
      serverlens_path: "/opt/serverlens/bin/serverlens"   # ServerLens install path
      config_path: "/etc/serverlens/config.yaml"          # ServerLens config on the server

  # ─── Second server example ───
  # Uncomment and fill in if you need another:
  #
  # staging:
  #   ssh:
  #     host: "5.6.7.8"
  #     user: "deploy"
  #     key: "~/.ssh/id_ed25519"
  #   remote:
  #     php: "php"
  #     serverlens_path: "/opt/serverlens/bin/serverlens"
  #     config_path: "/etc/serverlens/config.yaml"
