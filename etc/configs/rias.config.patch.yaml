# ═══════════════════════════════════════════════════════════════
# RIAS-сервер (87.249.36.116) — изменения в config.yaml
# Путь на сервере: /etc/serverlens/config.yaml
#
# Что нужно изменить:
#   1. databases — расширить allowed_filters для async_queue_request
#   2. databases — добавить таблицы debt_subrequest, payment_document
# ═══════════════════════════════════════════════════════════════

# ─── СЕКЦИЯ databases ───
# Изменить существующую таблицу async_queue_request:
databases:
  connections:
    - name: "rias_prod"              # имя подключения (оставить текущее)
      # host, port, database, user, password_env — оставить как есть
      tables:
        # БЫЛО:
        #   - name: "async_queue_request"
        #     allowed_filters: ["id", "org_id"]
        #     allowed_order_by: ["id"]
        #
        # СТАЛО:
        - name: "async_queue_request"
          allowed_fields: ["id", "org_id", "state", "routine", "dt_state_changed", "dt_created", "priority", "attempt_count", "error_message"]
          denied_fields: ["request_body", "response_body"]
          max_rows: 1000
          allowed_filters: ["id", "org_id", "state", "routine", "dt_state_changed", "dt_created", "priority"]
          allowed_order_by: ["id", "dt_created", "dt_state_changed", "priority"]

        # ДОБАВИТЬ таблицы:
        - name: "debt_subrequest"
          allowed_fields: ["id", "org_id", "sync_status", "draft", "dt_created", "dt_updated", "subrequest_type"]
          denied_fields: []
          max_rows: 500
          allowed_filters: ["id", "org_id", "sync_status", "draft", "dt_created", "subrequest_type"]
          allowed_order_by: ["id", "dt_created", "dt_updated"]

        - name: "payment_document"
          allowed_fields: ["id", "org_id", "sync_status", "draft", "dt_created", "dt_updated", "doc_type", "status"]
          denied_fields: []
          max_rows: 500
          allowed_filters: ["id", "org_id", "sync_status", "draft", "dt_created", "doc_type", "status"]
          allowed_order_by: ["id", "dt_created", "dt_updated"]

        # ... (остальные существующие таблицы оставить как есть) ...

# ─── ЗАМЕТКИ ───
#
# Фильтрация по state в async_queue_request:
#   Теперь можно делать запросы вида:
#     {"database": "rias_prod", "table": "async_queue_request",
#      "filters": {"state": {"eq": "locked"}}, "order_by": ["-dt_state_changed"]}
#
# Узнать имена полей таблицы (на сервере от имени serverlens_readonly):
#   psql -U serverlens_readonly -d имя_базы -c '\d async_queue_request'
#   psql -U serverlens_readonly -d имя_базы -c '\d debt_subrequest'
#   psql -U serverlens_readonly -d имя_базы -c '\d payment_document'
#
# После изменения конфига:
#   php /opt/serverlens/bin/serverlens validate-config --config /etc/serverlens/config.yaml
