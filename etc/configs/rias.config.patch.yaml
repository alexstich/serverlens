# ─── СЕКЦИЯ system: ЗАМЕНИТЬ ЦЕЛИКОМ ───

system:
  enabled: true
  allowed_services:
    - "nginx"
    - "php8.4-fpm"
    - "rabbitmq-server"
    - "postgresql"
    - "gischannel"
    - "asyncqueue"
    - "asyncdispatch"
    - "async-task-queue"
    - "massexport"
    - "fail2ban"
  allowed_docker_stacks: []


# ─── СЕКЦИЯ logs.sources: ДОБАВИТЬ к существующим ───

    - name: "syslog"
      path: "/var/log/syslog"
      format: "plain"
      max_lines: 3000

    - name: "php84_fpm"
      path: "/var/log/php8.4-fpm.log"
      format: "plain"
      max_lines: 2000

    - name: "fail2ban"
      path: "/var/log/fail2ban.log"
      format: "plain"
      max_lines: 3000

    # Логи приложения Yii — укажи актуальные пути
    # Типичные расположения:
    #   /var/www/rias/runtime/logs/app.log
    #   /var/www/rias/console/runtime/logs/app.log
    #   /var/www/html/runtime/logs/app.log
    # Проверь: find /var/www -path '*/runtime/logs/*.log' 2>/dev/null
    - name: "yii_app"
      path: "/var/www/rias-gkh.ru/runtime/logs/app.log"
      format: "plain"
      max_lines: 5000

    - name: "yii_gisgkh-analytics"
      path: "/var/www/gisgkh-analytics/runtime/logs/app.log"
      format: "plain"
      max_lines: 5000


# ─── СЕКЦИЯ databases: ИЗМЕНИТЬ таблицу async_queue_request, ДОБАВИТЬ таблицы ───
# Вставить в существующий список tables:

        - name: "async_queue_request"
          allowed_fields: ["id", "kind", "org_id", "message_guid", "state", "routine", "completed_stage", "priority", "attempt", "wake_time", "dt_state_changed", "error", "exception_text"]
          denied_fields: ["misc", "items_class"]
          max_rows: 1000
          allowed_filters: ["id", "org_id", "state", "routine", "kind", "dt_state_changed", "priority"]
          allowed_order_by: ["id", "dt_state_changed", "priority"]

        - name: "debt_subrequest"
          allowed_fields: ["id", "created", "updated", "deleted", "draft", "organization_id", "organization_branch_id", "sender_id", "executor_id", "response_status", "sync_date", "sync_status", "sync_error", "sync_error_message", "modification_date", "request_guid", "organization_branch_sector_id"]
          denied_fields: []
          max_rows: 500
          allowed_filters: ["id", "organization_id", "sync_status", "draft", "created", "sender_id", "executor_id"]
          allowed_order_by: ["id", "created", "updated"]

        - name: "payment_document"
          allowed_fields: ["id", "created", "updated", "deleted", "account_id", "author_id", "sender_id", "number", "unique_number", "period_year", "period_month", "total_payable", "draft", "sync_date", "sync_status", "sync_error", "sync_error_message", "organization_id", "organization_branch_id", "organization_branch_sector_id"]
          denied_fields: []
          max_rows: 500
          allowed_filters: ["id", "organization_id", "sync_status", "draft", "created", "account_id", "period_year", "period_month"]
          allowed_order_by: ["id", "created", "updated"]
