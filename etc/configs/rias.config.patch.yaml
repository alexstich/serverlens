# ─── СЕКЦИЯ system: ЗАМЕНИТЬ ЦЕЛИКОМ ───

system:
  enabled: true
  allowed_services:
    - "nginx"
    - "php8.4-fpm"
    - "rabbitmq-server"
    - "postgresql"
    - "gischannel"
    - "asyncqueue"
    - "asyncdispatch"
    - "async-task-queue"
    - "massexport"
    - "fail2ban"
  allowed_docker_stacks: []


# ─── СЕКЦИЯ logs.sources: ДОБАВИТЬ к существующим ───

    - name: "syslog"
      path: "/var/log/syslog"
      format: "plain"
      max_lines: 3000

    - name: "php84_fpm"
      path: "/var/log/php8.4-fpm.log"
      format: "plain"
      max_lines: 2000

    - name: "fail2ban"
      path: "/var/log/fail2ban.log"
      format: "plain"
      max_lines: 3000

    # Логи приложения Yii — укажи актуальные пути
    # Типичные расположения:
    #   /var/www/rias/runtime/logs/app.log
    #   /var/www/rias/console/runtime/logs/app.log
    #   /var/www/html/runtime/logs/app.log
    # Проверь: find /var/www -path '*/runtime/logs/*.log' 2>/dev/null
    - name: "yii_app"
      path: "/var/www/rias-gkh.ru/runtime/logs/app.log"
      format: "plain"
      max_lines: 5000

    - name: "yii_gisgkh-analytics"
      path: "/var/www/gisgkh-analytics/runtime/logs/app.log"
      format: "plain"
      max_lines: 5000


# ─── СЕКЦИЯ databases: ИЗМЕНИТЬ таблицу async_queue_request, ДОБАВИТЬ таблицы ───
# Вставить в существующий список tables:

        - name: "async_queue_request"
          allowed_fields: ["id", "org_id", "state", "routine", "dt_state_changed", "dt_created", "priority", "attempt_count", "error_message"]
          denied_fields: ["request_body", "response_body"]
          max_rows: 1000
          allowed_filters: ["id", "org_id", "state", "routine", "dt_state_changed", "dt_created", "priority"]
          allowed_order_by: ["id", "dt_created", "dt_state_changed", "priority"]

        - name: "debt_subrequest"
          allowed_fields: ["id", "org_id", "sync_status", "draft", "dt_created", "dt_updated", "subrequest_type"]
          denied_fields: []
          max_rows: 500
          allowed_filters: ["id", "org_id", "sync_status", "draft", "dt_created", "subrequest_type"]
          allowed_order_by: ["id", "dt_created", "dt_updated"]

        - name: "payment_document"
          allowed_fields: ["id", "org_id", "sync_status", "draft", "dt_created", "dt_updated", "doc_type", "status"]
          denied_fields: []
          max_rows: 500
          allowed_filters: ["id", "org_id", "sync_status", "draft", "dt_created", "doc_type", "status"]
          allowed_order_by: ["id", "dt_created", "dt_updated"]
