# ─── СЕКЦИЯ system: ЗАМЕНИТЬ ЦЕЛИКОМ ───

system:
  enabled: true
  allowed_services:
    # Веб-сервер
    - "nginx"
    # PHP-FPM
    - "php8.1-fpm"
    - "php8.2-fpm"
    # RabbitMQ
    - "rabbitmq-server"
    # GIS-каналы (синхронные запросы к ГИС)
    - "gischannel"
    - "gischannel-appeal-export"
    - "gischannel-debt-export"
    - "gischannel-debt-export-2"
    - "gischannel-debt-import"
    - "gischannel-export-object-address"
    - "gischannel-payments-readings"
    - "gischannel-quality-information"
    - "gischannel-quality-information-2"
    # Async-очереди (асинхронные запросы к ГИС)
    - "asyncqueue"
    - "async-appeal-queue-export"
    - "async-debt-queue-export"
    - "async-debt-queue-export-2"
    - "async-debt-queue-import"
    - "async-export-object-address-queue"
    - "async-payments-readings-queue"
    - "async-quality-information-queue"
    - "async-quality-information-queue-2"
    - "async-task-queue@1"
  allowed_docker_stacks: []


# ─── СЕКЦИЯ logs.sources: ДОБАВИТЬ к существующим ───
# Логи воркеров идут в journald → syslog.
# Отдельных лог-файлов нет.

    - name: "syslog"
      path: "/var/log/syslog"
      format: "plain"
      max_lines: 3000

    - name: "php82_fpm"
      path: "/var/log/php8.2-fpm.log"
      format: "plain"
      max_lines: 2000

    - name: "php81_fpm"
      path: "/var/log/php8.1-fpm.log"
      format: "plain"
      max_lines: 2000
